<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chronofrost: Aetherbound</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: #060c0b;
        color: #d6f8b8;
        font-family: monospace;
      }
      #app {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        gap: 12px;
      }
      #game {
        image-rendering: pixelated;
        border: 2px solid #4c7a5b;
        box-shadow: 0 0 24px rgba(155, 231, 208, 0.15);
      }
      #game canvas {
        image-rendering: pixelated;
      }
      .hint {
        font-size: 12px;
        opacity: 0.7;
        max-width: 640px;
        text-align: center;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="game"></div>
      <p class="hint">
        Move: WASD / Arrows &nbsp;•&nbsp; Interact: E / Space &nbsp;•&nbsp;
        Battle: A attack, F freeze, D defend &nbsp;•&nbsp; Back: Esc
      </p>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
