version: 2
updates:
  # Application dependencies (pnpm workspace).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Batch low-risk updates into single PRs to reduce noise.
      minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used in CI.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
